<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Menu dengan jQuery</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f5f5f5;
        }

        .menu {
            width: 200px;
            background-color: #2c3e50;
            color: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .menu-item {
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #34495e;
        }

        .menu-item:hover {
            background-color: #34495e;
        }

        .submenu {
            display: none;
            background-color: #3d566e;
        }

        .submenu-item {
            padding: 12px 15px;
            cursor: pointer;
        }

        .submenu-item:hover {
            background-color: #5c7ea6;
        }
    </style>
</head>
<body>

<div class="menu">
    <div class="menu-item">Menu Utama</div>
    <div class="submenu">
        <div class="submenu-item">Submenu 1</div>
        <div class="submenu-item">Submenu 2</div>
        <div class="submenu-item">Submenu 3</div>
    </div>
</div>

<script>
    $(document).ready(function(){
        $(".menu-item").click(function(){
            $(".submenu").slideToggle("fast");
        });
    });
</script>

</body>
</html>
