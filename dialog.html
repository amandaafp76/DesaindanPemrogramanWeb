<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dialog Download dengan Progressbar</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            background-color: #eef2f7;
            text-align: center;
        }

        #dialog {
            display: none;
        }

        #progressbar {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Contoh Dialog Download</h2>
    <button id="startDownload">Mulai Download</button>

    <div id="dialog" title="Mengunduh File...">
        <p>Proses download sedang berlangsung:</p>
        <div id="progressbar"></div>
    </div>

    <script>
        $(document).ready(function(){
            $("#startDownload").click(function(){
                $("#dialog").dialog({
                    modal: true,
                    closeOnEscape: false,
                    open: function(event, ui) {
                        $(".ui-dialog-titlebar-close").hide(); 
                    }
                });

                $("#progressbar").progressbar({
                    value: 0
                });

                let progress = 0;
                let interval = setInterval(function(){
                    progress += 2;
                    $("#progressbar").progressbar("value", progress);

                    if (progress >= 100) {
                        clearInterval(interval);
                        $("#dialog").dialog("option", "title", "Selesai");
                        $("#dialog").html("<p>Download selesai!</p>");
                    }
                }, 100);
            });
        });
    </script>

</body>
</html>
